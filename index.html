<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pomotimer</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      background:#111113;
      color:#fff;
      min-height:100vh;overflow:hidden;
      user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;
    }

    /* ---- Background ---- */
    .bg{position:fixed;inset:0;z-index:0;pointer-events:none;}
    .bg-grid{
      position:absolute;inset:0;
      background-image:radial-gradient(rgba(255,255,255,0.06) 1px,transparent 1px);
      background-size:24px 24px;
    }
    .bg-blur{
      position:absolute;inset:0;
      background:
        radial-gradient(ellipse 700px 500px at 25% 35%, rgba(247,37,133,0.07) 0%, transparent 100%),
        radial-gradient(ellipse 600px 600px at 75% 65%, rgba(114,9,183,0.06) 0%, transparent 100%),
        radial-gradient(ellipse 700px 400px at 50% 85%, rgba(67,97,238,0.06) 0%, transparent 100%),
        radial-gradient(ellipse 500px 500px at 15% 75%, rgba(76,201,240,0.05) 0%, transparent 100%),
        radial-gradient(ellipse 600px 400px at 85% 20%, rgba(181,23,158,0.05) 0%, transparent 100%);
    }

    /* ---- Page Layout ---- */
    .page{
      position:relative;z-index:1;
      width:100vw;height:100vh;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:12px;
    }

    .logo{width:48px;height:48px;object-fit:contain;}
    h1{font-weight:300;font-size:18px;color:#636366;letter-spacing:2px;text-transform:uppercase;margin-bottom:28px;}

    /* ---- Timer Grid ---- */
    .timer-grid{
      display:grid;
      grid-template-columns:repeat(4,200px);
      gap:32px;
      justify-content:center;
    }
    .timer-instance{display:flex;flex-direction:column;align-items:center;gap:12px;}
    .timer-label{font-size:12px;color:#636366;letter-spacing:1px;text-transform:uppercase;}

    /* ---- Squircle Timer (exact from app) ---- */
    .timer{
      width:200px;height:200px;
      background:rgba(44,44,46,0.95);
      position:relative;overflow:hidden;
      display:flex;flex-direction:column;align-items:center;justify-content:space-between;
      clip-path:url(#squircle-clip);
      padding:19px 0;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }

    /* ---- Icon Row (exact from app) ---- */
    .icon-row{display:flex;align-items:center;justify-content:center;gap:15px;z-index:2;width:100%;}
    .icon-slot{width:22px;height:22px;display:flex;align-items:center;justify-content:center;}
    .icon-slot svg{width:20px;height:20px;color:#8e8e93;}
    .icon-slot.large svg{width:22px;height:22px;}
    .icon-slot.active svg{color:#0091ff;}
    .icon-slot.muted svg{color:#8e8e93;}
    .icon-slot.empty{width:22px;height:22px;}

    /* ---- Rings (exact from app) ---- */
    .ring-svg,.wheel-svg{position:absolute;top:16px;left:16px;padding:38px;pointer-events:none;}
    .wheel-svg{pointer-events:auto;}
    .ring-track,.playback-ring-track{fill:none;stroke:rgba(255,255,255,0.08);stroke-width:4;}
    .ring-progress{fill:none;stroke:#0091ff;stroke-width:4;stroke-linecap:round;}
    .playback-ring-segment{fill:none;stroke-width:4;}
    .playback-ring-segment.completed{opacity:0.9;}

    /* ---- Time Display (exact from app) ---- */
    .time-display{
      position:absolute;top:74px;left:0;width:200px;
      text-align:center;display:flex;flex-direction:column;align-items:center;gap:4px;z-index:2;
    }
    .time-main{font-weight:100;font-size:28px;color:#fff;line-height:1;}
    .time-seconds{font-weight:100;font-size:18px;color:#ccc;line-height:1;}

    /* ---- Completion Overlay (exact from app) ---- */
    .completion-overlay{
      position:absolute;top:62px;left:62px;width:76px;height:76px;
      border-radius:50%;background:rgba(44,44,46,0.55);
      display:flex;align-items:center;justify-content:center;z-index:3;
    }
    .completion-overlay svg{width:44px;height:44px;color:#0091ff;}

    /* ---- CTA ---- */
    .cta{
      margin-top:28px;display:inline-flex;align-items:center;gap:8px;
      padding:12px 28px;background:rgba(44,44,46,0.95);border:none;border-radius:20px;
      color:#fff;font-size:14px;font-weight:400;cursor:pointer;text-decoration:none;
      transition:background 0.2s;
    }
    .cta:hover{background:rgba(55,55,58,0.95);}
    .cta svg{width:16px;height:16px;color:#0091ff;}

    /* ---- Footer ---- */
    .footer{margin-top:32px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:8px;}
    .footer-tagline{font-size:13px;color:#636366;letter-spacing:0.5px;font-style:italic;}
    .footer-madeby{font-size:12px;color:#48484a;}
    .footer-links{display:flex;gap:16px;align-items:center;}
    .footer-links a{color:#636366;transition:color 0.2s;display:flex;align-items:center;text-decoration:none;}
    .footer-links a svg{width:20px;height:20px;}
    .footer-links a.fb:hover{color:#0091ff;}
    .footer-links a.yt:hover{color:#ff0000;}

    /* ---- 2x2 Grid ---- */
    @media(max-width:960px){
      .timer-grid{grid-template-columns:repeat(2,200px);gap:24px;}
    }
    @media(max-width:480px){
      .timer-grid{grid-template-columns:repeat(2,1fr);max-width:440px;gap:12px;}
      .timer{transform:scale(0.78);transform-origin:center;}
      .timer-instance{margin:-16px -10px;}
      h1{font-size:14px;margin-bottom:16px;}
      .timer-label{font-size:10px;}
      .cta{margin-top:16px;padding:10px 22px;font-size:13px;}
      .page{gap:4px;}
    }
    @media(max-height:700px){
      .timer{transform:scale(0.8);transform-origin:center;}
      .timer-instance{margin:-10px -8px;}
      h1{margin-bottom:12px;}
      .page{gap:4px;}
    }
    @media(max-height:560px){
      .timer{transform:scale(0.6);transform-origin:center;}
      .timer-instance{margin:-24px -20px;}
      h1{font-size:13px;margin-bottom:4px;}
      .logo{width:36px;height:36px;}
      .page{gap:0;}
      .footer{margin-top:12px;}
    }
  </style>
</head>
<body>

  <div class="bg">

          </div>
        </div>
      </div>

      <!-- ============ PAGE 4: Completion ============ -->
      <div class="timer-instance">
        <div class="timer-label">Complete</div>
        <div class="timer">
          <div class="icon-row">
            <div class="icon-slot empty"></div>
            <div class="icon-slot empty"></div>
            <div class="icon-slot empty"></div>
          </div>
          <svg class="ring-svg" width="168" height="168" viewBox="0 0 168 168" id="playback-rings-done">
            <circle class="playback-ring-track" cx="84" cy="84" r="80" stroke-dasharray="502.65" stroke-dashoffset="0" transform="rotate(-90 84 84)"></circle>

    </div>

    <a href="https://apps.microsoft.com" class="cta" target="_blank" rel="noopener">

        </a>
      </div>
    </div>
  </div>

  <script>
    // Live clock (exact from app: updateClockDisplay)
    (function(){
      var cm=document.getElementById('clock-main');
      var cs=document.getElementById('clock-sec');
      var rp=document.querySelector('#page1 .ring-progress');
      function tick(){
        var n=new Date();
        var hh=n.getHours().toString().padStart(2,'0');
        var mm=n.getMinutes().toString().padStart(2,'0');
        var ss=n.getSeconds().toString().padStart(2,'0');
        if(cm)cm.textContent=hh+':'+mm;
        if(cs)cs.textContent=ss;
        var total=n.getMinutes()*60+n.getSeconds();
        var offset=502.65*(1-total/3600);
        var prog=document.querySelector('.ring-progress');
        if(prog)prog.setAttribute('stroke-dashoffset',offset);
      }
      tick();setInterval(tick,1000);
    })();

    // Block zoom
    document.addEventListener('wheel',function(e){if(e.ctrlKey)e.preventDefault();},{passive:false,capture:true});
    document.addEventListener('keydown',function(e){
      if((e.ctrlKey||e.metaKey)&&(e.key==='+'||e.key==='-'||e.key==='='||e.key==='0'))e.preventDefault();
      if(e.key==='F12'){e.preventDefault();return false;}
      if(e.ctrlKey&&e.shiftKey&&'IiJjCc'.indexOf(e.key)!==-1){e.preventDefault();return false;}
      if(e.ctrlKey&&e.key==='U'){e.preventDefault();return false;}
    },true);
    document.addEventListener('contextmenu',function(e){e.preventDefault();},true);
    document.addEventListener('selectstart',function(e){e.preventDefault();},true);
    document.addEventListener('copy',function(e){e.preventDefault();},true);
    document.addEventListener('cut',function(e){e.preventDefault();},true);
    document.addEventListener('dragstart',function(e){e.preventDefault();},true);
  </script>
</body>
</html>
